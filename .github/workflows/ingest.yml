name: Ingest XML Results

on:
  workflow_dispatch:
    inputs:
      source:
        description: 'Trigger source (gas/manual)'
        default: 'manual'

jobs:
  ingest:
    name: Process XML from Storage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install supabase httpx rapidfuzz

      - name: Run ingestion pipeline
        run: python -m python.pipeline.ingest_cli --from-storage --season-end-year 2026
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_CERT_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_CERT_SERVICE_ROLE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Notify failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="Ingestion workflow FAILED. Check: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            -d parse_mode=Markdown