name: Release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "release"
  cancel-in-progress: false

jobs:
  # ─── Build ────────────────────────────────────────────────────────
  build:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      schema_fingerprint: ${{ steps.fingerprint.outputs.fingerprint }}
    steps:
      # Pin to latest main — the SAME commit deploy-cert/deploy-prod apply via
      # `git pull origin main`. Without this, build checks out the triggering CI
      # commit (github.sha); if a migration-bearing commit lands on main while an
      # earlier release run is mid-flight, deploy applies the new migration but
      # build's fingerprint is from the old commit → false fingerprint mismatch
      # at the deploy gate (the 2026-06-25 PROD-deploy failure).
      - uses: actions/checkout@v5
        with:
          ref: main

      # --- Schema fingerprint from LOCAL Docker Supabase ---
      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase local stack
        run: supabase start

      - name: Compute LOCAL schema fingerprint
        id: fingerprint
        run: |
          FP=$(bash scripts/schema-fingerprint.sh local)
          echo "fingerprint=$FP" >> "$GITHUB_OUTPUT"
          echo "Schema fingerprint: $FP"

      - name: Stop Supabase
        run: supabase stop

      # --- Generate release manifest ---
      - name: Generate release manifest
        run: bash scripts/generate-manifest.sh "${{ steps.fingerprint.outputs.fingerprint }}"

      # --- Frontend build ---
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Inject Supabase credentials (CERT + PROD)
        working-directory: frontend
        run: |
          sed -i 's|supabase-cert-url="[^"]*"|supabase-cert-url="${{ secrets.SUPABASE_CERT_URL }}"|' index.html
          sed -i 's|supabase-cert-key="[^"]*"|supabase-cert-key="${{ secrets.SUPABASE_CERT_ANON_KEY }}"|' index.html
          sed -i 's|supabase-prod-url="[^"]*"|supabase-prod-url="${{ secrets.SUPABASE_PROD_URL }}"|' index.html
          sed -i 's|supabase-prod-key="[^"]*"|supabase-prod-key="${{ secrets.SUPABASE_PROD_ANON_KEY }}"|' index.html
          # ADR-079 amend — register.html (standalone registration page) is built
          # by the CE bundle (vite.config.ce.ts), not the main one: Svelte only
          # bundles a nested (non-customElement) child component's <style> into a
          # shadow root when the WHOLE compile graph runs with customElement:true,
          # so RegistrationForm/EntryList render unstyled under the main build's
          # plain config. Inject creds into the same shared source file here;
          # both builds below read it.
          sed -i 's|supabase-cert-url="[^"]*"|supabase-cert-url="${{ secrets.SUPABASE_CERT_URL }}"|' register.html
          sed -i 's|supabase-cert-key="[^"]*"|supabase-cert-key="${{ secrets.SUPABASE_CERT_ANON_KEY }}"|' register.html
          sed -i 's|supabase-prod-url="[^"]*"|supabase-prod-url="${{ secrets.SUPABASE_PROD_URL }}"|' register.html
          sed -i 's|supabase-prod-key="[^"]*"|supabase-prod-key="${{ secrets.SUPABASE_PROD_ANON_KEY }}"|' register.html

      - name: Build frontend
        working-directory: frontend
        run: npx vite build --base ./

      - name: Build + merge register.html (CE bundle)
        working-directory: frontend
        run: |
          npx vite build --config vite.config.ce.ts --base ./
          cp dist-ce/register.html dist/register.html
          mkdir -p dist/assets
          cp -r dist-ce/assets/. dist/assets/

      - name: Verify no secrets or localhost in build
        run: |
          ! grep -r 'service_role' frontend/dist/
          ! grep -r '127.0.0.1' frontend/dist/
          ! grep -r 'supabase-demo' frontend/dist/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  # ─── Deploy Pages ─────────────────────────────────────────────────
  deploy-pages:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ─── Deploy CERT ──────────────────────────────────────────────────
  deploy-cert:
    needs: build
    environment: cert
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check for pending CERT migrations
        id: check
        run: bash scripts/check-new-migrations.sh cert

      - name: Apply migrations to CERT
        if: steps.check.outputs.has_new_migrations == 'true'
        id: apply
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_REF: ${{ secrets.SUPABASE_CERT_REF }}
        run: |
          bash scripts/apply-migrations.sh cert "${{ needs.build.outputs.schema_fingerprint }}"

      - name: Verify CERT fingerprint (no new migrations)
        if: steps.check.outputs.has_new_migrations != 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_REF: ${{ secrets.SUPABASE_CERT_REF }}
        run: |
          CLOUD_FP=$(bash scripts/schema-fingerprint.sh cloud "$SUPABASE_REF")
          LOCAL_FP="${{ needs.build.outputs.schema_fingerprint }}"
          if [ "$CLOUD_FP" != "$LOCAL_FP" ]; then
            echo "ERROR: CERT fingerprint mismatch!" >&2
            echo "  LOCAL: $LOCAL_FP" >&2
            echo "  CERT:  $CLOUD_FP" >&2
            exit 1
          fi
          echo "CERT fingerprint verified: $CLOUD_FP"

      # ADR-041: deploy Edge Functions to CERT. Idempotent — Supabase replaces
      # the function on each deploy. Function source: supabase/functions/.
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Deploy Edge Functions to CERT
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy dispatch-workflow \
            --project-ref "${{ secrets.SUPABASE_CERT_REF }}" \
            --no-verify-jwt=false

      - name: Update tracking files
        if: steps.check.outputs.has_new_migrations == 'true'
        run: |
          bash scripts/update-tracking.sh cert \
            "${{ github.sha }}" \
            "${{ needs.build.outputs.schema_fingerprint }}" \
            '${{ steps.check.outputs.new_migrations }}'

      - name: Commit tracking update
        if: steps.check.outputs.has_new_migrations == 'true'
        # Retry-and-regenerate instead of stash/rebase/stash-pop: the old
        # sequence stashed a locally-computed JSON diff, pulled, then tried
        # to 3-way-merge that stash back in -- guaranteed to CONFLICT
        # whenever two Release runs land close together, since both compute
        # independent diffs of the same auto-generated file (observed live
        # 2026-07-14: a manual dispatch and the CI-triggered run collided,
        # the second's tracking commit failed outright). update-tracking.sh
        # is idempotent -- it re-derives the file from whatever's on disk --
        # so on a push race we just re-fetch, reset to the new tip (safe:
        # this is a disposable checkout, no other local work exists), and
        # regenerate + recommit against that fresh base instead of merging.
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for attempt in 1 2 3 4 5; do
            bash scripts/update-tracking.sh cert \
              "${{ github.sha }}" \
              "${{ needs.build.outputs.schema_fingerprint }}" \
              '${{ steps.check.outputs.new_migrations }}'
            git add deployed_migrations.json release-manifest.json
            git commit -m "chore: update CERT tracking [skip ci]"
            if git push; then
              echo "Pushed on attempt $attempt"
              break
            fi
            if [ "$attempt" = 5 ]; then
              echo "::error::Failed to push CERT tracking update after 5 attempts" >&2
              exit 1
            fi
            echo "Push rejected (race with a concurrent release run) -- refetching and retrying ($attempt/5)"
            sleep $(( (RANDOM % 5) + 1 ))
            git fetch origin main
            git reset --hard origin/main
          done

  # ─── Deploy PROD ──────────────────────────────────────────────────
  deploy-prod:
    needs: [build, deploy-cert, deploy-pages]
    environment: production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main

      - name: Pull latest (includes CERT tracking commit)
        run: git pull origin main

      - name: Check for pending PROD migrations
        id: check
        run: bash scripts/check-new-migrations.sh prod

      - name: Apply migrations to PROD
        if: steps.check.outputs.has_new_migrations == 'true'
        id: apply
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_REF: ${{ secrets.SUPABASE_PROD_REF }}
        run: |
          bash scripts/apply-migrations.sh prod "${{ needs.build.outputs.schema_fingerprint }}"

      - name: Verify PROD fingerprint (no new migrations)
        if: steps.check.outputs.has_new_migrations != 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_REF: ${{ secrets.SUPABASE_PROD_REF }}
        run: |
          CLOUD_FP=$(bash scripts/schema-fingerprint.sh cloud "$SUPABASE_REF")
          LOCAL_FP="${{ needs.build.outputs.schema_fingerprint }}"
          if [ "$CLOUD_FP" != "$LOCAL_FP" ]; then
            echo "ERROR: PROD fingerprint mismatch!" >&2
            echo "  LOCAL: $LOCAL_FP" >&2
            echo "  PROD:  $CLOUD_FP" >&2
            exit 1
          fi
          echo "PROD fingerprint verified: $CLOUD_FP"

      # ADR-041: deploy Edge Functions to PROD.
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Deploy Edge Functions to PROD
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy dispatch-workflow \
            --project-ref "${{ secrets.SUPABASE_PROD_REF }}" \
            --no-verify-jwt=false

      - name: Update tracking files
        if: steps.check.outputs.has_new_migrations == 'true'
        run: |
          bash scripts/update-tracking.sh prod \
            "${{ github.sha }}" \
            "${{ needs.build.outputs.schema_fingerprint }}" \
            '${{ steps.check.outputs.new_migrations }}'

      - name: Commit tracking update
        if: steps.check.outputs.has_new_migrations == 'true'
        # See the matching comment on deploy-cert's "Commit tracking update"
        # -- same retry-and-regenerate fix, same race it closes.
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for attempt in 1 2 3 4 5; do
            bash scripts/update-tracking.sh prod \
              "${{ github.sha }}" \
              "${{ needs.build.outputs.schema_fingerprint }}" \
              '${{ steps.check.outputs.new_migrations }}'
            git add deployed_migrations.json release-manifest.json
            git commit -m "chore: update PROD tracking [skip ci]"
            if git push; then
              echo "Pushed on attempt $attempt"
              break
            fi
            if [ "$attempt" = 5 ]; then
              echo "::error::Failed to push PROD tracking update after 5 attempts" >&2
              exit 1
            fi
            echo "Push rejected (race with a concurrent release run) -- refetching and retrying ($attempt/5)"
            sleep $(( (RANDOM % 5) + 1 ))
            git fetch origin main
            git reset --hard origin/main
          done
