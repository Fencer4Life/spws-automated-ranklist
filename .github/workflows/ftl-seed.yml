name: FTL Seed Organizer Delivery

# ADR-080 §5 / FR-131. Manual CERT/PROD delivery is available immediately.
# The PROD deadline sweep is disabled by default and requires the repository
# variable ENABLE_FTL_DEADLINE_SEND=true after the CERT pilot is signed off.

on:
  workflow_dispatch:
    inputs:
      event_code:
        description: 'Full event code, e.g. PPW5-2025-2026'
        required: true
      target:
        description: 'Target Supabase environment'
        type: choice
        options:
          - cert
          - prod
        default: cert
  schedule:
    - cron: '0 4 * * *'

permissions:
  contents: read

jobs:
  manual-delivery:
    if: github.event_name == 'workflow_dispatch'
    name: Deliver current FTL seed bundle
    runs-on: ubuntu-latest
    concurrency:
      group: ftl-seed-${{ inputs.target }}-${{ inputs.event_code }}
      cancel-in-progress: false
    env:
      EVENT_CODE: ${{ inputs.event_code }}
      TARGET_ENV: ${{ inputs.target }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install runtime dependencies
        run: pip install supabase httpx
      - name: Validate inputs
        run: |
          if ! [[ "$EVENT_CODE" =~ ^[A-Z0-9_-]+$ ]]; then
            echo "::error::invalid event_code (must match [A-Z0-9_-]+)"
            exit 1
          fi
          if [[ "$TARGET_ENV" != "cert" && "$TARGET_ENV" != "prod" ]]; then
            echo "::error::target must be cert or prod"
            exit 1
          fi
      - name: Generate, deliver and stamp
        env:
          SUPABASE_URL: ${{ inputs.target == 'prod' && secrets.SUPABASE_PROD_URL || secrets.SUPABASE_CERT_URL }}
          SUPABASE_KEY: ${{ inputs.target == 'prod' && secrets.SUPABASE_PROD_SERVICE_ROLE_KEY || secrets.SUPABASE_CERT_SERVICE_ROLE_KEY }}
          SPWS_GMAIL_USER: ${{ secrets.SPWS_GMAIL_USER }}
          SPWS_GMAIL_APP_PASSWORD: ${{ secrets.SPWS_GMAIL_APP_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python -m python.pipeline.ftl_feed_seed_send \
            --event-code "$EVENT_CODE" \
            --target "$TARGET_ENV" \
            --send-telegram
      - name: Notify failure
        if: failure()
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_URL: ${{ format('https://github.com/{0}/actions/runs/{1}', github.repository, github.run_id) }}
        run: |
          curl -sS -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TG_CHAT}" \
            --data-urlencode "text=FTL seed delivery failed for ${EVENT_CODE} (${TARGET_ENV}). Check ${RUN_URL}" > /dev/null

  deadline-sweep:
    if: github.event_name == 'schedule' && vars.ENABLE_FTL_DEADLINE_SEND == 'true'
    name: Deliver due PROD rosters
    runs-on: ubuntu-latest
    concurrency:
      group: prod-write
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install runtime dependencies
        run: pip install supabase httpx
      - name: Sweep eligible deadlines
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_PROD_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_PROD_SERVICE_ROLE_KEY }}
          SPWS_GMAIL_USER: ${{ secrets.SPWS_GMAIL_USER }}
          SPWS_GMAIL_APP_PASSWORD: ${{ secrets.SPWS_GMAIL_APP_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python -m python.pipeline.ftl_feed_seed_send \
            --sweep-deadlines \
            --target prod \
            --send-telegram
      - name: Notify deadline sweep failure
        if: failure()
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_URL: ${{ format('https://github.com/{0}/actions/runs/{1}', github.repository, github.run_id) }}
        run: |
          curl -sS -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TG_CHAT}" \
            --data-urlencode "text=FTL deadline sweep failed. Check ${RUN_URL}" > /dev/null
