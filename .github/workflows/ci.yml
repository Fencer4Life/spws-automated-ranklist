name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-db:
    name: pgTAP (database)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: supabase/setup-cli@v1
        with:
          version: 2.84.2

      - name: Start Supabase local stack
        run: supabase start

      - name: Run pgTAP tests
        run: supabase test db

  test-python:
    name: pytest (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      # Ruff baseline is clean (lint + format) — these steps now ENFORCE (block CI).
      - name: Ruff lint
        run: ruff check python/ scripts/render_adrs.py scripts/render_docs.py

      - name: Ruff format check
        run: ruff format --check python/ scripts/render_adrs.py scripts/render_docs.py

      # basedpyright baseline is clean — enforces (blocks CI), same as ruff above.
      - name: basedpyright type-check
        run: basedpyright python/ scripts/render_adrs.py scripts/render_docs.py

      - name: Validate generated ADR HTML
        run: python scripts/render_adrs.py --check

      - name: Validate generated Docs HTML
        run: python scripts/render_docs.py --check

      - name: Run pytest
        run: pytest

  test-frontend:
    name: Vitest (frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run Vitest
        working-directory: frontend
        run: npm test

  coherence:
    name: Coherence Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Run coherence checks
        run: bash scripts/check-coherence.sh
