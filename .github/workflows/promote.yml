name: Promote Event to PROD

on:
  workflow_dispatch:
    inputs:
      event_code:
        description: 'Event code prefix (e.g. PPW4)'
        required: true

jobs:
  promote:
    name: CERT → PROD Promotion
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install httpx

      - name: Promote event
        run: python -m python.pipeline.promote --event "${{ github.event.inputs.event_code }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_CERT_REF: ${{ secrets.SUPABASE_CERT_REF }}
          SUPABASE_PROD_REF: ${{ secrets.SUPABASE_PROD_REF }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Notify failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="Promotion FAILED for ${{ github.event.inputs.event_code }}. Check: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
