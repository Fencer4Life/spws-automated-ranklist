name: EVF Calendar + Results Sync

on:
  schedule:
    # Daily at 06:00 UTC. The --filter-stale flag (passed only on scheduled
    # runs) skips events that already have results in CERT, so the daily
    # cadence is cheap. Manual workflow_dispatch keeps full-scrape semantics.
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'calendar | results | both'
        default: 'both'
      event_code:
        description: 'Event code for results mode (e.g. PEW7-2025-2026)'
        required: false
      filter_stale:
        description: 'Skip events already scored in CERT (defaults true on cron, false on manual)'
        type: boolean
        default: false

jobs:
  sync:
    name: EVF Sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install httpx beautifulsoup4 rapidfuzz pypdf

      - name: Run EVF sync
        run: |
          # On scheduled runs, default to --filter-stale so daily cadence is cheap.
          # On manual dispatch, honour the workflow input toggle.
          if [ "${{ github.event_name }}" = "schedule" ]; then
            FLAG="--filter-stale"
          elif [ "${{ github.event.inputs.filter_stale }}" = "true" ]; then
            FLAG="--filter-stale"
          else
            FLAG=""
          fi
          python -m python.scrapers.evf_sync \
            --mode "${{ github.event.inputs.mode || 'both' }}" \
            --event-code "${{ github.event.inputs.event_code || '' }}" \
            $FLAG
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_CERT_REF: ${{ secrets.SUPABASE_CERT_REF }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Notify failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="EVF sync FAILED. Check: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  promote-calendar:
    name: Promote EVF calendar → PROD
    needs: sync
    # Run when mode ∈ {calendar, both} (default 'both' on cron). Skip on results-only dispatch.
    if: ${{ github.event.inputs.mode != 'results' }}
    runs-on: ubuntu-latest
    # Serialise with the manual per-event promote (promote.yml).
    concurrency:
      group: prod-write
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install httpx

      - name: Promote calendar CERT → PROD
        run: python -m python.pipeline.promote --mode calendar
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_CERT_REF: ${{ secrets.SUPABASE_CERT_REF }}
          SUPABASE_PROD_REF: ${{ secrets.SUPABASE_PROD_REF }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Notify failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="EVF calendar promote FAILED. Check: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
