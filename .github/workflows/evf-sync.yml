name: EVF Calendar + Results Sync

on:
  schedule:
    # Daily at 06:00 UTC. The --filter-stale flag (passed only on scheduled
    # runs) skips events that already have results in CERT, so the daily
    # cadence is cheap. Manual workflow_dispatch keeps full-scrape semantics.
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'calendar | results | both'
        default: 'both'
      event_code:
        description: 'Event code for results mode (e.g. PEW7-2025-2026)'
        required: false
      filter_stale:
        description: 'Skip events already scored in CERT (defaults true on cron, false on manual)'
        type: boolean
        default: false

jobs:
  promote-calendar-pre:
    name: Promote EVF calendar → PROD (pre-scrape)
    # Converge PROD to CERT's current state BEFORE the scraper writes new
    # rows, so a scrape failure never leaves PROD further behind than it
    # needs to be, and any admin edits already sitting in CERT land on PROD
    # even if the scrape step itself fails downstream. fn_mirror_events_to_prod
    # is a full Create/Update/Delete converge keyed on txt_code -- a no-op
    # when CERT and PROD already agree, so running it twice per workflow
    # (pre and post) is safe.
    if: ${{ github.event.inputs.mode != 'results' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: prod-write
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install httpx supabase

      - name: Promote calendar CERT → PROD (pre-scrape)
        run: python -m python.pipeline.promote --mode calendar
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_CERT_REF: ${{ secrets.SUPABASE_CERT_REF }}
          SUPABASE_PROD_REF: ${{ secrets.SUPABASE_PROD_REF }}
          SUPABASE_CERT_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_CERT_SERVICE_ROLE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Commit reconcile run log
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add doc/staging/reconcile/*.md 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No reconcile report to commit"
          else
            git commit -m "chore: CERT→PROD reconcile run log (pre-scrape) [skip ci]"
            for attempt in 1 2 3 4 5; do
              if git push; then
                break
              fi
              echo "Push rejected (attempt $attempt) -- fetching and rebasing"
              git fetch origin main
              git rebase origin/main
              if [ "$attempt" = "5" ]; then
                echo "::error::git push failed after 5 attempts"
                exit 1
              fi
            done
          fi

      - name: Notify failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="EVF pre-scrape calendar promote FAILED. Check: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  sync:
    name: EVF Sync
    needs: promote-calendar-pre
    # Run regardless of promote-calendar-pre's outcome (skipped on
    # mode=results, or even if it failed) -- a broken PROD promote must not
    # block getting new events into CERT. Only a cancelled workflow run
    # skips this job.
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install httpx beautifulsoup4 rapidfuzz pypdf

      - name: Run EVF sync
        run: |
          # On scheduled runs, default to --filter-stale so daily cadence is cheap.
          # On manual dispatch, honour the workflow input toggle.
          if [ "${{ github.event_name }}" = "schedule" ]; then
            FLAG="--filter-stale"
          elif [ "${{ github.event.inputs.filter_stale }}" = "true" ]; then
            FLAG="--filter-stale"
          else
            FLAG=""
          fi
          python -m python.scrapers.evf_sync \
            --mode "${{ github.event.inputs.mode || 'both' }}" \
            --event-code "${{ github.event.inputs.event_code || '' }}" \
            $FLAG
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_CERT_REF: ${{ secrets.SUPABASE_CERT_REF }}
          # FTL creds let the ADR-070 self-heal re-derive real event dates from
          # the (login-walled) FTL results pages before halting on a
          # future-COMPLETED row.
          FTL_USERNAME: ${{ secrets.FTL_USERNAME }}
          FTL_PASSWORD: ${{ secrets.FTL_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Notify failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="EVF sync FAILED. Check: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  promote-calendar:
    name: Promote EVF calendar → PROD
    needs: sync
    # Run when mode ∈ {calendar, both} (default 'both' on cron), skip on
    # results-only dispatch. !cancelled() is required, not cosmetic: GitHub
    # Actions' default "needs" gate looks at the WHOLE ancestor chain, not
    # just the direct need. Without it, a promote-calendar-pre failure
    # (upstream of sync) silently skips this job too even though sync itself
    # succeeded -- observed live 2026-07-14 (run 29309139092): sync landed
    # 13 new CERT events but this job never ran to promote them to PROD.
    if: ${{ !cancelled() && github.event.inputs.mode != 'results' }}
    runs-on: ubuntu-latest
    # contents: write so the run-report .md can be committed back to doc/staging.
    permissions:
      contents: write
    # Serialise with the manual per-event promote (promote.yml).
    concurrency:
      group: prod-write
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      # supabase-py is used to upload the run-report to the CERT staging-reports
      # bucket (best-effort; the repo copy under doc/staging/reconcile always writes).
      - name: Install dependencies
        run: pip install httpx supabase

      - name: Promote calendar CERT → PROD
        run: python -m python.pipeline.promote --mode calendar
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_CERT_REF: ${{ secrets.SUPABASE_CERT_REF }}
          SUPABASE_PROD_REF: ${{ secrets.SUPABASE_PROD_REF }}
          SUPABASE_CERT_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_CERT_SERVICE_ROLE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      # Commit the human-readable reconcile run log (doc/staging/reconcile/{season}.{ts}Z.md),
      # mirroring the per-event scrape reports. [skip ci] so it doesn't re-trigger CI.
      - name: Commit reconcile run log
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add doc/staging/reconcile/*.md 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No reconcile report to commit"
          else
            git commit -m "chore: CERT→PROD reconcile run log [skip ci]"
            for attempt in 1 2 3 4 5; do
              if git push; then
                break
              fi
              echo "Push rejected (attempt $attempt) -- fetching and rebasing"
              git fetch origin main
              git rebase origin/main
              if [ "$attempt" = "5" ]; then
                echo "::error::git push failed after 5 attempts"
                exit 1
              fi
            done
          fi

      - name: Notify failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="EVF calendar promote FAILED. Check: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
