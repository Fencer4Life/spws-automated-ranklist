name: EVF Calendar + Results Sync

on:
  schedule:
    # Every 3 days at 06:00 UTC
    - cron: '0 6 */3 * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'calendar | results | both'
        default: 'both'
      event_code:
        description: 'Event code for results mode (e.g. PEW7-2025-2026)'
        required: false

jobs:
  sync:
    name: EVF Sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install httpx beautifulsoup4 rapidfuzz pypdf

      - name: Run EVF sync
        run: python -m python.scrapers.evf_sync --mode "${{ github.event.inputs.mode || 'both' }}" --event-code "${{ github.event.inputs.event_code || '' }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_CERT_REF: ${{ secrets.SUPABASE_CERT_REF }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Notify failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="EVF sync FAILED. Check: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
