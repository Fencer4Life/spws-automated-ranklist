name: Export Seed from PROD

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Trigger reason (promote/manual)'
        default: 'manual'
      source:
        description: 'Source environment'
        default: 'prod'
        type: choice
        options:
          - prod
          - cert

permissions:
  contents: write

jobs:
  export:
    name: Export monolithic seed (ADR-036)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install httpx

      - name: Export seed
        run: |
          if [ "${{ github.event.inputs.source }}" = "cert" ]; then
            REF="${{ secrets.SUPABASE_CERT_REF }}"
          else
            REF="${{ secrets.SUPABASE_PROD_REF }}"
          fi
          python -m python.pipeline.export_seed --ref "$REF"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Commit seed file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add supabase/seed_prod_*.sql supabase/seed_prod_latest.sql
          if git diff --cached --quiet; then
            echo "No seed changes to commit"
          else
            git commit -m "chore: auto-export seed from ${{ github.event.inputs.source }} (${{ github.event.inputs.reason }}) [skip ci]"
            git push
          fi

      - name: Notify success
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="Seed exported from ${{ github.event.inputs.source }} (${{ github.event.inputs.reason }}). Git updated."

      - name: Notify failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="Seed export FAILED. Check: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
