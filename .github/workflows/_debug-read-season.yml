name: _debug-read-season

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  read:
    runs-on: ubuntu-latest
    steps:
      - name: Read CERT SPWS-2025-2026 and SPWS-2026-2027 season rows
        run: |
          curl -s -X POST "https://api.supabase.com/v1/projects/${SUPABASE_CERT_REF}/database/query" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"query": "SELECT txt_code, dt_start, dt_end, bool_active FROM tbl_season WHERE txt_code IN ('"'"'SPWS-2025-2026'"'"', '"'"'SPWS-2026-2027'"'"') ORDER BY txt_code"}' \
            | python3 -m json.tool
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_CERT_REF: ${{ secrets.SUPABASE_CERT_REF }}
