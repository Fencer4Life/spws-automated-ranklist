name: DEBUG Read Season Row (temporary)

on:
  workflow_dispatch:
    inputs:
      season_code:
        description: 'Season code to read from CERT'
        required: true

jobs:
  read:
    runs-on: ubuntu-latest
    steps:
      - name: Read season row from CERT (read-only)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_CERT_REF: ${{ secrets.SUPABASE_CERT_REF }}
          SEASON_CODE: ${{ github.event.inputs.season_code }}
        run: |
          # Defense in depth: validate shape before it reaches any SQL string
          # (matches python/pipeline/promote_season.py's own guard).
          if ! [[ "$SEASON_CODE" =~ ^SPWS-[0-9]{4}-[0-9]{4}$ ]]; then
            echo "::error::Invalid season code shape: $SEASON_CODE" >&2
            exit 1
          fi
          curl -s -X POST "https://api.supabase.com/v1/projects/${SUPABASE_CERT_REF}/database/query" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"query\": \"SELECT to_jsonb(s) AS j FROM tbl_season s WHERE s.txt_code = '${SEASON_CODE}'\"}" \
            | python3 -m json.tool
